<div class="dashboard-wrapper">

  <!-- Top Navigation -->
  <header class="topnav">
    <div class="topnav-brand">
      <span class="topnav-name">LifeTrack</span>
    </div>
    <div class="topnav-right">
      <div class="user-chip">
        <div class="user-avatar" [style.background]="roleColor">{{ initial }}</div>
        <div class="user-info">
          <span class="user-name">{{ user?.name }}</span>
          <span class="user-role">{{ user?.role }}</span>
        </div>
      </div>
      <button class="btn-change-pass" (click)="openCPModal()" title="Change Password">
        Change Password
      </button>
      <button class="btn-logout" (click)="logout()">Sign Out</button>
    </div>
  </header>

  <!-- Role-Based Content (routed) -->
  <router-outlet></router-outlet>

</div>


<!-- ══════════════════════════════════════════════
     Change Password Modal  (shared by all roles)
     ══════════════════════════════════════════════ -->
<div class="cp-backdrop" *ngIf="showCPModal" (click)="onBackdrop($event)">
  <div class="cp-card" role="dialog" aria-modal="true" aria-labelledby="cp-title">

    <!-- Header -->
    <div class="cp-header">
      <div class="cp-header-left">
        <div class="cp-icon"><svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg></div>
        <div>
          <h2 class="cp-title" id="cp-title">Change Password</h2>
          <p class="cp-sub">{{ user?.email }}</p>
        </div>
      </div>
      <button class="cp-close" (click)="closeCPModal()" [disabled]="cpSubmitting">&times;</button>
    </div>

    <!-- Success state -->
    <div *ngIf="cpSuccess" class="cp-success">
      <div class="success-icon">&#10003;</div>
      <p class="success-msg">Password changed successfully!</p>
      <p class="success-sub">You'll need your new password on next login.</p>
    </div>

    <!-- Form -->
    <form *ngIf="!cpSuccess" [formGroup]="cpForm" (ngSubmit)="submitCP()" novalidate>
      <div class="cp-body">

        <!-- Current Password -->
        <div class="form-group">
          <label class="form-label">Current Password <span class="required">*</span></label>
          <div class="pw-wrap">
            <input
              [type]="showCurrent ? 'text' : 'password'"
              class="form-input"
              formControlName="currentPassword"
              [class.invalid]="cf('currentPassword').touched && cf('currentPassword').invalid"
              placeholder="Enter current password"
              autocomplete="current-password" />
            <button type="button" class="pw-toggle" (click)="showCurrent = !showCurrent">
              {{ showCurrent ? 'Hide' : 'Show' }}
            </button>
          </div>
          <span class="field-error" *ngIf="fieldErr('currentPassword')">{{ fieldErr('currentPassword') }}</span>
        </div>

        <!-- New Password -->
        <div class="form-group">
          <label class="form-label">New Password <span class="required">*</span></label>
          <div class="pw-wrap">
            <input
              [type]="showNew ? 'text' : 'password'"
              class="form-input"
              formControlName="newPassword"
              [class.invalid]="cf('newPassword').touched && cf('newPassword').invalid"
              placeholder="Minimum 8 characters"
              autocomplete="new-password" />
            <button type="button" class="pw-toggle" (click)="showNew = !showNew">
              {{ showNew ? 'Hide' : 'Show' }}
            </button>
          </div>
          <span class="field-error" *ngIf="fieldErr('newPassword')">{{ fieldErr('newPassword') }}</span>
        </div>

        <!-- Confirm New Password -->
        <div class="form-group">
          <label class="form-label">Confirm New Password <span class="required">*</span></label>
          <div class="pw-wrap">
            <input
              [type]="showConfirm ? 'text' : 'password'"
              class="form-input"
              formControlName="confirmPassword"
              [class.invalid]="cf('confirmPassword').touched && (cf('confirmPassword').invalid || cpForm.errors?.['mismatch'])"
              placeholder="Re-enter new password"
              autocomplete="new-password" />
            <button type="button" class="pw-toggle" (click)="showConfirm = !showConfirm">
              {{ showConfirm ? 'Hide' : 'Show' }}
            </button>
          </div>
          <span class="field-error" *ngIf="confirmErr">{{ confirmErr }}</span>
        </div>

        <!-- API error -->
        <div class="form-error-banner" *ngIf="cpError">{{ cpError }}</div>

      </div>

      <!-- Footer -->
      <div class="cp-footer">
        <button type="button" class="btn-cancel" (click)="closeCPModal()" [disabled]="cpSubmitting">
          Cancel
        </button>
        <button type="submit" class="btn-submit" [disabled]="cpSubmitting">
          <span *ngIf="!cpSubmitting">Update Password</span>
          <span *ngIf="cpSubmitting" class="btn-spinner"></span>
        </button>
      </div>
    </form>

  </div>
</div>
